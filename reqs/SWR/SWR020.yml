text: |
  GUI 가상 버튼 클릭 이벤트를 CAN 메시지로 변환하여 메인 ECU에 전송한다. 브레이크/액셀 페달 신호는 GPIO 또는 ADC 입력을 GUI와 별도로 CAN 전송할 수 있다. 버튼 입력에 대해 20ms 디바운싱을 적용한다 (GUI 클릭은 단일 이벤트이므로 반복 방지 용도). 브레이크/액셀 페달은 디바운싱 없이 즉시 처리한다.
