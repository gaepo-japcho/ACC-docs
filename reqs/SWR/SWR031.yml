text: |
  ACC 활성화 시 설정 최고속도를 max(현재속도, 최소설정속도)로 클램핑한다. 최소설정속도는 캘리브레이션 파라미터로 정의하며, 1/10 스케일카 특성에 맞게 튜닝한다. 속도+/- 버튼으로 조정 시에도 최소설정속도 이하로 내려가지 않도록 제한한다.
