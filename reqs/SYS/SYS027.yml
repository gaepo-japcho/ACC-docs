  STANDBY 상태에서 운전자가 Resume 버튼을 누르면, 전방 차량이 안전거리 이내에 감지된 경우 FOLLOWING으로, 감지되지 않은 경우 CRUISE로 전이한다. 이전 설정 속도와 안전거리 단계가 그대로 적용된다. 자차 속도가 0인 경우(정지 상태)에서 Resume 시에도 동일하게 동작한다.
