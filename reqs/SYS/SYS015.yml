  카메라+LiDAR 처리 유닛(RPi/Jetson)은 CAN 메시지로 다음 정보를 메인 ECU(MPC5606B)에 전송한다: 전방 차량 감지 여부(1bit), 차간거리(16bit, mm), 상대속도(16bit, 0.01m/s). 전송 주기: 20ms.
