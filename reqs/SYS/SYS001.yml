text: |
  OFF 상태: ACC 기능 비활성. 운전자가 ACC ON/OFF 토글 버튼을 누르면:
  - 자가진단 실패(FAULT 조건) 시: ACC가 켜지지 않고 OFF 유지
  - 자가진단 통과 + 전방 차량 미감지: 현재 속도를 최고속도로 설정, CRUISING으로 전이
  - 자가진단 통과 + 전방 차량 감지: 현재 속도를 최고속도로 설정, FOLLOWING으로 전이
