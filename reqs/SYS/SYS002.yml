  STANDBY 상태: ACC 활성화 대기. 설정 속도가 지정되고 Set 버튼이 눌리면 CRUISE로 전이한다. Resume 버튼이 눌리면 이전 설정값으로 복귀한다 (전방 차량 유무에 따라 CRUISE 또는 FOLLOWING). 브레이크에 의한 STANDBY 진입 시 이전 설정 속도 및 안전거리 단계를 보존한다.
