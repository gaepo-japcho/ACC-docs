text: |
  시스템은 명확한 상태 머신으로 관리되어야 한다. OFF, STANDBY, CRUISING, FOLLOWING, FAULT 5개 상태를 포함한다. CRUISING: 전방 차량 미감지 시 설정 속도 유지. FOLLOWING: 전방 차량 감지 시 안전거리 유지하며 추종. FAULT: 센서/통신 이상 시 진입, 능동 감속 없이 운전자에게 경고, 운전자가 ACC OFF로 수동 해제.
