text: |
  ACC 활성화 시 설정 최고속도에 최소값 하한을 둔다. 현재 자차 속도가 최소 설정 속도 미만인 경우, 최소 설정 속도를 최고속도로 자동 설정한다. (예: 만도 ACC의 0~30km/h → 30km/h 설정 방식 참고. 1/10 스케일카 특성에 맞게 파라미터 튜닝 필요)
